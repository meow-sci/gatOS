name: Mod release

# Builds the COMPLETE gatOS mod dist and publishes it as a GitHub release. Unlike
# purrTTY (one platform-agnostic zip), gatOS ships a QEMU subprocess, so the dist is
# platform-specific and we publish TWO zips per release:
#
#   gatOS-windows-<v>.zip  — managed payload + guest image + bundled win-x64 QEMU
#                            (tools/fetch-qemu.sh). Self-contained: zero prerequisites.
#   gatOS-linux-<v>.zip    — managed payload + guest image, NO bundled QEMU. Relies on
#                            the player's system QEMU (QemuLocator falls back to PATH on
#                            Linux). Players must install qemu-system-x86_64 themselves
#                            (see README "Linux support"). Bundling a portable linux-x64
#                            QEMU is the still-unbuilt T11.6; until it lands the Linux
#                            dist is not self-contained.
#
# Both dists are assembled on Linux runners by gatOS.GameMod's CopyCustomContent target
# (the managed payload is platform-agnostic .NET; the only delta is the bundled QEMU).
#
# Deliberately NOT run on every commit (that's build.yml's job: build + full test suite
# on main / release/** / feature/** / PRs). This workflow only fires for the tip of main
# and named releases:
#
#   push to main        → prerelease  "gatOS tip <UTC timestamp>"  (tag tip-<stamp>)
#   push to release/<v> → release     "gatOS <v>"                  (tag v<v>)
#
# (build.yml runs the test gate on the same commit for both refs.)
#
# The KSA reference assemblies are licensed game files in the private repo
# meow-sci/ksa-game-assemblies (DLLs under current/dll/). A real release MUST compile
# gatOS.GameMod against them (the game-coupled Game/** half is compile-gated on
# KSA.dll), so the checkout is unconditional — access needs the KSA_GAME_ASSEMBLIES_PAT
# repo secret (fine-grained read-only Contents, same pattern as purrtty / build.yml).

# Skip when a push touches ONLY the docs site (site/**) — that's site-deploy.yml's job.
# A mixed commit that also touches code still cuts a release; workflow_dispatch is
# unaffected.
on:
  push:
    branches:
      - main
      - 'release/**'
    paths-ignore:
      - 'site/**'
  workflow_dispatch:

permissions:
  contents: write    # create/update/delete releases + tags

# One in-flight release build per ref; a newer push supersedes an older run — except on
# release/* refs: cancelling a publish between `gh release delete` and `gh release create`
# would leave the release missing until the next push.
concurrency:
  group: mod-release-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/heads/release/') }}

jobs:
  # Derive the version/tag/title once so both platform builds stamp the identical
  # mod.toml version and the publish job tags the identical release.
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.m.outputs.version }}
      modversion: ${{ steps.m.outputs.modversion }}
      tag: ${{ steps.m.outputs.tag }}
      title: ${{ steps.m.outputs.title }}
      prerelease: ${{ steps.m.outputs.prerelease }}
      guestver: ${{ steps.m.outputs.guestver }}
    steps:
      - name: Checkout gatOS
        uses: actions/checkout@v6

      # Branch-derived values are validated here and consumed downstream via outputs,
      # never interpolated raw into run scripts (a ref name can contain shell/sed
      # metacharacters).
      - name: Compute release metadata
        id: m
        run: |
          BASE="$(sed -nE 's/^version = "(.*)"/\1/p' gatOS.GameMod/mod.toml)"
          if [[ ! "$BASE" =~ ^[0-9A-Za-z._-]+$ ]]; then
            echo "::error::could not parse a usable base version from gatOS.GameMod/mod.toml (got: '$BASE')"
            exit 1
          fi
          echo "guestver=$(cat guest/GUEST_VERSION)" >> "$GITHUB_OUTPUT"
          if [[ "$GITHUB_REF_NAME" == release/* ]]; then
            NAME="${GITHUB_REF_NAME#release/}"
            if [[ ! "$NAME" =~ ^[0-9A-Za-z._-]+$ ]]; then
              echo "::error::release branch suffix '$NAME' must match ^[0-9A-Za-z._-]+\$ (no slashes or shell metacharacters)"
              exit 1
            fi
            echo "version=$NAME"            >> "$GITHUB_OUTPUT"
            echo "modversion=$NAME"         >> "$GITHUB_OUTPUT"
            echo "tag=v$NAME"               >> "$GITHUB_OUTPUT"
            echo "title=gatOS $NAME"        >> "$GITHUB_OUTPUT"
            echo "prerelease=false"         >> "$GITHUB_OUTPUT"
          else
            # main (the only other ref this workflow runs on): timestamped tip prerelease.
            STAMP="$(date -u +%Y%m%d-%H%M%S)"
            echo "version=tip-$STAMP"          >> "$GITHUB_OUTPUT"
            echo "modversion=$BASE-tip.$STAMP" >> "$GITHUB_OUTPUT"
            echo "tag=tip-$STAMP"              >> "$GITHUB_OUTPUT"
            echo "title=gatOS tip $STAMP (UTC)" >> "$GITHUB_OUTPUT"
            echo "prerelease=true"             >> "$GITHUB_OUTPUT"
          fi

  # One dist per platform, both assembled on Linux runners. The windows leg additionally
  # fetches + bundles the win-x64 QEMU; the linux leg ships none (system QEMU at runtime).
  build:
    needs: meta
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        platform: [windows, linux]
    env:
      KSA_DLL_DIR: ${{ github.workspace }}/.tmp/ksa-game-assemblies/current/dll
      # CopyCustomContent assembles the mod folder at $GATOS_DIST_DIR/gatOS/.
      GATOS_DIST_DIR: ${{ github.workspace }}/.tmp/dist
    steps:
      - name: Checkout gatOS
        uses: actions/checkout@v6

      - name: Checkout private KSA assemblies
        uses: actions/checkout@v6
        with:
          repository: meow-sci/ksa-game-assemblies
          path: .tmp/ksa-game-assemblies
          token: ${{ secrets.KSA_GAME_ASSEMBLIES_PAT }}
          persist-credentials: false
          ref: main

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      # tools/fetch-qemu.sh unpacks the Weil NSIS installer, which needs full 7-Zip
      # (7zz). The `7zip` apt package provides it. Windows dist only.
      - name: Install 7-Zip
        if: matrix.platform == 'windows'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q --no-install-recommends 7zip

      # Bundle the pinned win-x64 QEMU into vendor/qemu/win-x64/ so the Windows mod runs
      # without a system QEMU install (D5). Windows dist only.
      - name: Fetch pinned win-x64 QEMU
        if: matrix.platform == 'windows'
        run: tools/fetch-qemu.sh

      # Bundle the pinned guest image (guest-v<N> release) into guest/out/. Both dists.
      - name: Fetch pinned guest image
        env:
          GH_TOKEN: ${{ github.token }}
        run: guest/fetch-guest.sh

      # The version users see in-game / in mod.toml matches the release. MODVERSION is
      # validated in the meta job to [0-9A-Za-z._-]+, so it cannot contain the sed
      # delimiter or replacement metacharacters.
      - name: Stamp mod version
        env:
          MODVERSION: ${{ needs.meta.outputs.modversion }}
        run: |
          sed -i -E "s/^version = \".*\"/version = \"$MODVERSION\"/" gatOS.GameMod/mod.toml
          grep '^version' gatOS.GameMod/mod.toml

      # GameMod's CopyCustomContent target assembles the mod folder — managed payload +
      # guest/out/** (+ vendor/qemu/win-x64/** when present) — at $GATOS_DIST_DIR/gatOS/.
      - name: Build mod dist
        run: dotnet build gatOS.GameMod -c Release --nologo -v quiet

      - name: Package
        env:
          ZIP_NAME: gatOS-${{ matrix.platform }}-${{ needs.meta.outputs.version }}.zip
        run: |
          cd "$GATOS_DIST_DIR"
          zip -r "$ZIP_NAME" gatOS
          unzip -l "$ZIP_NAME" | tail -n 20

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.platform }}
          path: ${{ github.workspace }}/.tmp/dist/gatOS-${{ matrix.platform }}-${{ needs.meta.outputs.version }}.zip
          if-no-files-found: error

  # Both platform zips → one GitHub release.
  publish:
    needs: [meta, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v7
        with:
          path: .tmp/artifacts

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.meta.outputs.tag }}
          TITLE: ${{ needs.meta.outputs.title }}
          PRERELEASE: ${{ needs.meta.outputs.prerelease }}
          GUESTVER: ${{ needs.meta.outputs.guestver }}
        run: |
          mapfile -t ZIPS < <(find .tmp/artifacts -name '*.zip' | sort)
          if [[ ${#ZIPS[@]} -eq 0 ]]; then
            echo "::error::no dist zips found to publish"
            exit 1
          fi
          mkdir -p .tmp
          cat > .tmp/release-notes.md <<EOF
          All-in-one gatOS mod (bundled guest image v$GUESTVER).

          - \`gatOS-windows-*.zip\` — self-contained: bundles win-x64 QEMU, no prerequisites.
          - \`gatOS-linux-*.zip\` — requires a system QEMU (\`qemu-system-x86_64\`); see the README "Linux support".

          **Installing over an existing install:** delete the old \`gatOS/\` folder from your mods directory before unzipping — files removed from the mod are not removed by unzipping over it.
          EOF
          # Re-pushing a release/<v> branch rebuilds that release: drop the old release +
          # tag so the tag moves to the new commit. (Tip tags are timestamped and never
          # collide.)
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release delete "$TAG" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag
          fi
          EXTRA=()
          [[ "$PRERELEASE" == "true" ]] && EXTRA+=(--prerelease --latest=false)
          gh release create "$TAG" "${ZIPS[@]}" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "$TITLE" \
            --notes-file .tmp/release-notes.md \
            --generate-notes \
            "${EXTRA[@]}"

      # Keep the 5 newest tip prereleases; delete older ones (and their tags) so main
      # doesn't accumulate releases forever. Named releases untouched.
      - name: Prune old tip releases
        if: needs.meta.outputs.prerelease == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release list --repo "$GITHUB_REPOSITORY" --limit 200 \
            --json tagName,isPrerelease \
            --jq '.[] | select(.isPrerelease and (.tagName | startswith("tip-"))) | .tagName' \
            | tail -n +6 \
            | while read -r tag; do
                echo "Pruning $tag"
                gh release delete "$tag" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag
              done
